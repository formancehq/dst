apiVersion: formance.com/v1beta1
kind: Settings
metadata:
  name: formance-settings
spec:
  key: postgres.*.uri
  stacks:
    - "stack0"
  value: postgresql://ledger:ledger@postgres.formance-systems.svc.cluster.local:5432?disableSSLMode=true
---
apiVersion: formance.com/v1beta1
kind: Settings
metadata:
  name: formance-setting-ledger-image
spec:
  key: registries."ghcr.io".images."formancehq/ledger".rewrite
  stacks:
    - "stack0"
  value: "formancehq/ledger-instrumented"
---
apiVersion: formance.com/v1beta1
kind: Settings
metadata:
  name: formance-setting-ledger-grace-period
spec:
  key: modules.*.grace-period
  stacks:
    - "stack0"
  value: "5s"
---
apiVersion: formance.com/v1beta1
kind: Settings
metadata:
  name: stack0-kafka
spec:
  key: broker.dsn
  stacks:
    - "stack0"
  value: "kafka://formance-kafka-bootstrap.kafka.svc.cluster.local:9092"
---
apiVersion: formance.com/v1beta1
kind: Gateway
metadata:
  name: stack0-gateway
spec:
  stack: stack0
---
apiVersion: formance.com/v1beta1
kind: BrokerConsumer
metadata:
  name: ledger-broker-consumer
spec:
  stack: stack0
  queriedBy: admin
  services:
    - ledger
